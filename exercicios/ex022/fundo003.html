<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionado Fundos</title>
    <style>
        div.fundos{
            height: 150px;
            margin-bottom: 3px;
            border: 1px solid black;
            background-image: url(imagens/wallpaper003.jpg);
        }
        div#q1{
            background-position: left top;
        }
        div#q2{
            background-position: left center;
        }
        div#q3{
            background-position: right bottom;
        }
        div#q4{
            background-position: center center;
        }
    </style>
</head>
<body>
    <div class="fundos" id="q1">

    </div>
    <div class="fundos" id="q2">

    </div>
    <div class="fundos" id="q3">

    </div>
    <div class="fundos " id="q4">

    </div>
</body>
</html>
