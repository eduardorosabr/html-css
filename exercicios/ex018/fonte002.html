<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Internas</title>
    <style>
        @font-face {
            font-family: 'GTA';
            src: url(fonts/CloisterBlack.ttf) format('truetype');
        }
        /*
        Os formatos mais comuns são
        otf - opentype
        ttf - truetype
        embedded-opentype
        trutype-aat (Apple Advanced Typography)
        svg
        */
        body{
            font-family: GTA, Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            font-size: 20px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Bem Vindo a Los Santos</h1>
    <h2>O que fazer?</h2>
    <p>Los Santos é uma cidade pequena com muitos habitantes, e um cara chamado CJ</p>
</body>
</html>
