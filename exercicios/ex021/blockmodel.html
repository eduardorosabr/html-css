<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1{
            height: 300px;
            width: 300px;

        /*  padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            */
            padding: 10px;

         /* 
            border-top: 10px;
            border-right: 10px;
            border-bottom: 10px;
            border-left: 10px;
            */
            border-width: 10px;
            border-style: solid;
            border-color: rgba(47, 158, 19, 0.466);

            background-color: grey;
            

            outline-width: 10px;
            outline-style: dashed;
            outline-color:rgb(68, 101, 212);

            /*
            margin-top: 33px;
            margin-right: auto;
            margin-bottom: 50px;
            margin-left: auto; 
            */
            margin: 50px auto 50px auto;

            
        }
        a{
            border-top: 10px;
            border-right: 10px;
            border-bottom: 10px;
            border-left: 10px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            
            
            text-decoration: none;  
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Paragráfo também, é uma baixa box-level,<a href="#"> mas os links</a> são do tipo inline-level Vamos ver como tudo isso funciona</p>
</body>
</html>
