<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pairar</title>
    <style>
        div > p{
            display: none;
        }
        div:hover > p{
            display: block;
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Hover</h1>
    <div>
        Passe o mouse aqui!
        <p>Texto escondido!!</p>
    </div>
</body>
</html>
